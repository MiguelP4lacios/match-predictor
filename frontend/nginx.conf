server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: redirige rutas de React-Router al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API hacia el servicio backend en la red compose.
    # IMPORTANTE: usar el resolver de Docker (127.0.0.11) + upstream en variable obliga
    # a nginx a RE-RESOLVER la IP de `api` en cada request en vez de cachearla al
    # arrancar. Sin esto, al reconstruir el contenedor api cambia su IP y nginx queda
    # apuntando a la IP vieja (muerta) → 502 hasta reiniciar el frontend a mano
    # (bug de producción 2026-06-11, justo antes del inaugural).
    location /api {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
